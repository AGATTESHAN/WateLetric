    <!-- Firebase App and Auth SDKs compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // Initialize Firebase Authentication dynamically
        fetch('/api/firebase-config')
            .then(res => res.json())
            .then(config => {
                firebase.initializeApp(config);
                const isPlaceholder = config.apiKey.includes("ReplaceMe") || !config.apiKey;
                
                if (!isPlaceholder) {
                    firebase.auth().onAuthStateChanged(user => {
                        if (!user) {
                            window.location.href = 'index.html';
                        } else {
                            // Update email dynamically in Account Details
                            const emailLabel = document.evaluate("//label[contains(text(), 'Email Address')]/following-sibling::p", document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
                            if (emailLabel) {
                                emailLabel.innerText = user.email;
                            }
                        }
                    });
                } else {
                    // Update email dynamically using stored localStorage email in bypass/demo mode
                    const savedEmail = localStorage.getItem('userEmail') || 'demo@wateletric.com';
                    const emailLabel = document.evaluate("//label[contains(text(), 'Email Address')]/following-sibling::p", document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
                    if (emailLabel) {
                        emailLabel.innerText = savedEmail;
                    }
                }
            })
            .catch(err => {
                console.error("Could not fetch Firebase configuration", err);
            });

        function handleSignOut() {
            localStorage.removeItem('userEmail');
            if (window.firebase && typeof firebase.auth === "function") {
                firebase.auth().signOut().then(() => {
                    window.location.href = 'index.html';
                }).catch(err => {
                    console.error("Error signing out:", err);
                    window.location.href = 'index.html';
                });
            } else {
                window.location.href = 'index.html';
            }
        }

        document.querySelectorAll('.cursor-pointer').forEach(item => {
            item.addEventListener('click', () => {
                const toggle = item.querySelector('.relative > div');
                const bg = item.querySelector('.relative');
                if (toggle) {
                    if (toggle.classList.contains('right-1')) {
                        toggle.classList.remove('right-1');
                        toggle.classList.add('left-1');
                        bg.classList.remove('bg-secondary');
                        bg.classList.add('bg-outline-variant/40');
                    } else {
                        toggle.classList.remove('left-1');
                        toggle.classList.add('right-1');
                        bg.classList.remove('bg-outline-variant/40');
                        bg.classList.add('bg-secondary');
                    }
                }
            });
        });
    </script>
